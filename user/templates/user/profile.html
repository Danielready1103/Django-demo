{% extends 'base.html' %}

{% block title %}個人資訊{% endblock %}

{% block content %}
<h1>Profile</h1>

<ul>
    <P>使用者名稱: {{user}}</P>
    <p>註冊日期: {{user.date_joined}}</p>
    <p>Email: {{user.email}}</p>
    <p>管理員與否:
        {% if user.is_superuser %}
        是
        {% else %}
        否
        {% endif %}
    </p>
    <p>最後登入時間: {{user.last_login}}</p>
</ul>

{% endblock %}
