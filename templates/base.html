<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <style>
        #message {
            color: red;
        }

        body {
            background-color: antiquewhite;
        }

        #navbar {
            background-color: orange;
            padding: 12px;
        }

        #container {
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="navbar">
        {% if user.is_authenticated %}
        <P>使用者名稱: {{user}}<a href="{% url 'logout' %}">登出</a><br>
            {% else %}
        <p><a href="{% url 'login' %}">登入</a> <a href="{% url 'register' %}">註冊</a></p>
        {% endif %}
    </div>
    <div id="container">
        {% block content %}
        {% endblock %}

        <p id="message">{{message}}</p>
    </div>
</body>

</html>
