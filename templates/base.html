<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
        {% endblock %}
    </title>
</head>

<body>
    {% if user.is_authenticated %}
    <P>使用者名稱: {{user}}</P><a href="{% url 'logout' %}">登出</a><br>
    {% else %}
    <p><a href="{% url 'login' %}">登入</a> <a href="{% url 'register' %}">註冊</a></p>
    {% endif %}

    {% block content %}
    {% endblock %}

    <p id="message">{{message}}</p>
</body>

</html>
